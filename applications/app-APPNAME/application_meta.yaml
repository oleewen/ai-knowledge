# docs/ — 联邦单元根（对照 system/system_meta.yaml 语义）
schema_version: "1.1"

id: "DIR-APPLICATION-APPNAME"
name: "应用知识库根"
description: "knowledge（SSOT）、requirements、changelogs；命名与映射见 INDEX_GUIDE.md。"

role:
  kind: federation_application_root
  template_directory: app-APPNAME
  ssot_subdirectory: knowledge/

child_directories:
  knowledge:
    meta: knowledge/knowledge_meta.yaml
    description: 宪法层 + 四视角
  requirements:
    meta: requirements/requirements_meta.yaml
    description: REQUIREMENT-{ID}/ 交付包
  changelogs:
    meta: changelogs/changelogs_meta.yaml
    description: CHANGELOG 与可选索引产物

child_files:
  - README.md
  - INDEX_GUIDE.md
  - manifest.yaml

naming_conventions:
  directory_index:
    reference: ./knowledge/constitution/standards/NAMING-CONVENTIONS.md

integration:
  traceability: 应用侧实体 ID 与中央库对齐时仅写 ID 引用

references:
  - ./README.md
  - ./INDEX_GUIDE.md
  - ./knowledge/knowledge_meta.yaml
  - ../../README.md
  - ../../AGENTS.md
