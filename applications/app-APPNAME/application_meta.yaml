# 应用知识库根目录元数据（与 system/system_meta.yaml 对照；机器可读清单见 APPNAME_manifest.yaml）
id: "DIR-APPLICATION-TEMPLATE"
name: "应用文档库根（联邦单元模板）"
description: "企业级知识库应用侧根目录：README、APPNAME_INDEX、需求交付与 knowledge SSOT；由 docs-init 拷贝后替换 APP 标识。"

role:
  kind: "application_documentation_root"
  ssot_subdirectory: "knowledge/"

child_directories:
  knowledge:
    meta: "knowledge/knowledge_meta.yaml"
    description: "宪法层 + 四视角（SSOT）"
  requirements:
    meta: "requirements/requirements_meta.yaml"
  changelogs:
    meta: "changelogs/changelogs_meta.yaml"

child_files:
  - "README.md"
  - "APPNAME_INDEX.md"
  - "application_meta.yaml"
  - "APPNAME_manifest.yaml"

integration:
  upstream:
    - path: "../../system/"
      description: "中央库 system/ 与 ID 契约"
  traceability:
    description: "应用侧 knowledge/requirements 与中央库以全局唯一 ID 对齐；规约见各需求包 specs/ 或 knowledge/technical/"
