# 应用知识库根目录/knowledge/constitution 目录元数据
id: "DIR-KNOWLEDGE-CONSTITUTION"
name: "宪法与治理层（knowledge/constitution）"
description: "术语、原则、标准模板与 ADR：为四视角与阶段文档提供统一命名、可追溯决策与治理约束；不承载业务/产品/技术/数据实体定义。"

role:
  perspective: "constitution"
  is_system_level_index: true

inputs:
  - path: "(from-org-and-architecture-governance)"
    description: "组织级架构治理、评审结论与术语演进（人工/A代理入）"

outputs:
  primary_artifact:
    pattern: "constitution_meta.yaml, principles/principles_meta.yaml, standards/{standards_meta,naming-conventions,adr-template,adr_meta}.*, adr/adr_corpus_meta.yaml, adr/ADR-*.md, GLOSSARY.md, principles/**/*.{yaml,md}"
    description: "治理类产出；根级 constitution_meta + 子树 meta（principles/、standards/、adr/）；ADR 正文在 adr/；标准与模板在 standards/"

naming_conventions:
  structure:
    glossary: "GLOSSARY.md"
    principles_tree: "principles/（含 principles_meta.yaml）"
    standards_tree: "standards/（含 standards_meta.yaml、naming-conventions.md、adr-template.md、adr_meta.yaml）"
    adr_corpus: "adr/（含 adr_corpus_meta.yaml、ADR-{序号}-{短标题}.md）"
    adr_standard_meta: "standards/adr_meta.yaml"

indexing:
  readme_index_table: true
  rule: "新增术语、原则文件、标准或 ADR 时，应维护 README.md 组件表与必要的 ../../INDEX.md 登记"

integration:
  description: "本应用各视角与交付目录须遵守命名与 ADR；跨仓方案/分析阶段见中央库 system/"
  consumed_by:
    - path: "../business/"
    - path: "../product/"
    - path: "../technical/"
    - path: "../data/"
    - path: "../../requirements/"
    - path: "../../changelogs/"

references:
  - path: "./README.md"
    description: "本层使命、组件与使用顺序"
  - path: "./standards/naming-conventions.md"
    description: "全局 ID 与文件命名"
  - path: "./standards/adr_meta.yaml"
    description: "ADR 模板结构与落盘约定（机器可读）"
  - path: "../../INDEX.md"
    description: "本应用索引"
  - path: "../../../../system/DESIGN.md"
    description: "中央库元模型与目录设计"
  - path: "../../../../system/INDEX.md"
    description: "中央库索引（对照）"
