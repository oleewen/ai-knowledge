# applications/app-APPNAME/knowledge 目录元数据
id: "DIR-APP-APPNAME-KNOWLEDGE"
name: "应用知识库（app-APPNAME/knowledge）"
description: "app-APPNAME 应用级知识库：在系统 knowledge 结构与命名规范基础上，沉淀该应用的业务/产品/技术/数据事实与映射，支持联邦治理与可追溯交付。"

role:
  is_single_source_of_truth: false
  perspectives:
    - "constitution"
    - "business"
    - "product"
    - "technical"
    - "data"

inputs:
  - path: "(from-delivery-and-operations)"
    description: "随系统演进沉淀的事实、决策与交付结果（在归档阶段回写）"

outputs:
  primary_artifact:
    pattern: "*/README.md, */**/_meta.yaml, */**/*.yaml, */**/*.md"
    description: "知识条目与索引（按视角与实体层级组织）"

naming_conventions:
  ids:
    description: "实体 ID 使用全局唯一前缀（BD/BSD/BC/AGG、PL/PM/FT/UC、SYS/APP/MS、DS/ENT 等），遵循命名规范"
    reference: "./constitution/standards/naming-conventions.md"
  references:
    description: "文档间优先使用相对仓库根目录路径（如 knowledge/...），便于工具解析与跳转"

indexing:
  global_index:
    path: "../../INDEX.md"
    rule: "更新知识条目后，必要时同步更新 applications/INDEX.md 与各视角 README"
  per_perspective_readmes:
    - "./constitution/README.md"
    - "./business/README.md"
    - "./product/README.md"
    - "./technical/README.md"
    - "./data/README.md"

integration:
  consumed_by:
    - path: "../requirements/"
      description: "需求交付阶段可引用 knowledge 中术语、架构与映射"

references:
  - path: "./README.md"
    description: "knowledge 目录定位、结构与维护规则"
  - path: "../../INDEX.md"
    description: "applications 全局索引与导航"
  - path: "../../../system/DESIGN.md"
    description: "系统级目录结构与元模型规范"
  - path: "../../../system/CONTRIBUTING.md"
    description: "系统级新增/修改知识条目的贡献指南"
