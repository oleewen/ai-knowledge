# 模板示例
# applications/app-APPNAME/knowledge/business 目录元数据
id: "DIR-APP-APPNAME-KNOWLEDGE-BUSINESS"
name: "业务视角（applications/app-APPNAME/knowledge/business）"
description: "app-APPNAME 应用级业务视角：沉淀与该应用相关的业务域/子域/限界上下文/聚合等领域事实与映射，保持与 system/knowledge/business 的层级与字段约定一致。"

role:
  perspective: "business"
  is_system_level_index: false

inputs:
  - path: "../constitution/"
    description: "命名规范、术语与治理约束（应用侧继承系统规范）"
  - path: "../../../system/knowledge/business/"
    description: "系统级业务视角规范与索引参考"
  - path: "(from-delivery-and-operations)"
    description: "交付与运行沉淀的领域事实（归档回写）"

outputs:
  primary_artifact:
    pattern: "{BD-ID}/, {BD-ID}/**/_meta.yaml, {BD-ID}/**/aggregates/{AGG-ID}.yaml"
    description: "业务域/子域/限界上下文目录与聚合定义（应用侧聚焦于与 app-APPNAME 相关范围）"

naming_conventions:
  hierarchy:
    description: "业务域 (BD) → 业务子域 (BSD) → 限界上下文 (BC) → 聚合 (AGG)"
  key_fields:
    bounded_context:
      - "implemented_by_app_id"
    aggregate:
      - "persisted_as_entity_ids"

indexing:
  readme_index_table: true
  rule: "新增/调整 BD/BSD/BC/AGG 时，应同步维护 README.md 的业务索引表"

integration:
  mappings:
    - "业务 → 技术：BC 的 implemented_by_app_id 指向 applications/.../knowledge/technical 的 APP"
    - "业务 → 数据：AGG 的 persisted_as_entity_ids 指向 applications/.../knowledge/data 的 ENT"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段约定"
  - path: "../../INDEX.md"
    description: "applications 全局索引与导航"
  - path: "../../../system/DESIGN.md"
    description: "系统级目录结构与元模型规范"
