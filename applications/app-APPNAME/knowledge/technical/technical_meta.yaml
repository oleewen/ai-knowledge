# applications/app-APPNAME/knowledge/technical — 技术视角统一元数据（单文件 SSOT）
# 对齐 business_meta：identity + repository + pipeline + integration + layers
schema_version: "1.1"

identity:
  id: "DIR-KNOWLEDGE-TECHNICAL"
  name: "技术视角（knowledge/technical）"
  description: >
    应用知识库 · 技术视角：描述物理实现、部署架构与服务接口；与中央库同构、可联邦增量。
    注册 SYS/APP/MS/API，并承接应用级 manifest.yaml 的上报与索引。本文件为技术视角唯一元数据入口。

role:
  perspective: "technical"
  is_system_level_index: true

repository:
  root_relative: "knowledge/technical"
  child_directories:
    - "SYS-{ID}"
  child_files:
    - "README.md"
    - "SYSTEM-ARCHITECTURE.md"
  hierarchy:
    chain: "SYS → APP → MS → API"
    labels:
      SYS: "系统 (System)"
      APP: "应用 (Application)"
      MS: "微服务 (Microservice)"
      API: "接口 (API Endpoint)"
  directory_patterns:
    SYS: "{SYS-ID}/"
    APP: "{SYS-ID}/{APP-DIR}/"
    MS: "{SYS-ID}/{APP-DIR}/（服务实例与部署，逻辑归属 APP）"
    API: "逻辑归属 MS/网关路由；ID 为 API-*"

pipeline:
  inputs:
    - path: "../business/"
      description: "BC.implemented_by_app_id 指向本视角 APP"
    - path: "../product/"
      description: "FT/UC 的 API 引用对齐 manifest/OpenAPI"
    - path: "(from-app-repos)"
      description: "应用仓库 /docs/manifest.yaml（CI/CD 抓取）"
  outputs:
    ssot_file: "technical_meta.yaml"
    narrative: "各层字段模板见 `layers`；正式应用注册为 `{SYS-ID}/{APP-DIR}/{APP-ID}.yaml`。"
    directory_role: "SYS-* 为系统锚点目录，下挂应用目录与集成文档。"
  architecture_docs:
    - path: "./SYSTEM-ARCHITECTURE.md"
      description: "系统/子系统职责、边界与关系总览"

integration:
  cross_perspective:
    - from: { perspective: "business", kind: "BC", field: "implemented_by_app_id" }
      to: { layer: "app", field: "id" }
      meaning: "限界上下文由哪个应用实现"
    - from: { perspective: "business", kind: "AB", field: "implemented_by_api_id" }
      to: { layer: "api", field: "id" }
      meaning: "业务能力暴露为哪个 API"
    - from: { perspective: "product", kind: "FT", field: "invokes_api_ids" }
      to: { layer: "api", field: "id" }
      meaning: "功能引用的接口清单"
    - from: { perspective: "product", kind: "UC", field: "map_to_api_id" }
      to: { layer: "api", field: "id" }
      meaning: "用例到 API 的映射"
    - from: { perspective: "data", kind: "DS", field: "owned_by_app_id" }
      to: { layer: "app", field: "id" }
      meaning: "数据存储归属应用（可选链路到 MS）"
  key_fields:
    system: []
    application:
      - "repo_url"
      - "docs_manifest_path"
      - "service_ids"
    microservice:
      - "parent_app_id"
    api_endpoint:
      - "parent_ms_id"
      - "parent_app_id"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段"
  - path: "../../INDEX.md"
    description: "本联邦单元索引与映射速查"
  - path: "../../../../system/DESIGN.md"
    description: "中央库目录结构与元模型规范"

layers:
  - key: "sys"
    code: "SYS"
    order: 1
    entity_kind: "system"
    id_pattern: "SYS-{ID}"
    parent: null
    tree:
      child_directory_glob: "APP-{DIR}/"
    artifacts:
      markdown: "APPLICATION-ARCHITECTURE.md（系统目录内）"
    fields:
      boundary_notes: "职责与边界说明（可选）"
    indexing:
      readme_index_table: true
      rule: "新增/调整 SYS 时同步 README、SYSTEM-ARCHITECTURE"

  - key: "app"
    code: "APP"
    order: 2
    entity_kind: "application"
    id_pattern: "APP-{ID}"
    parent:
      field: "parent_sys_id"
      expects: "SYS-{ID}"
    tree:
      child_directory_glob: "服务与集成文档（约定目录）"
    artifacts:
      yaml_registration: "{APP-ID}.yaml"
    fields:
      repo_url: "Git 仓库地址"
      docs_manifest_path: "如 /docs/manifest.yaml"
      service_ids: "MS-* 列表"
      owner_team: "责任团队（可选）"
    indexing:
      readme_index_table: true
      rule: "新增/变更应用时同步 README、manifest、BC 映射"

  - key: "ms"
    code: "MS"
    order: 3
    entity_kind: "microservice"
    id_pattern: "MS-{ID}"
    parent:
      field: "parent_app_id"
      expects: "APP-{ID}"
    additional_parent:
      field: "parent_sys_id"
      expects: "SYS-{ID}"
    tree:
      child_directory_glob: null
    artifacts:
      openapi: "服务内 OpenAPI/Proto（仓库内）"
    fields:
      protocols: "HTTPS/gRPC 等（可选）"
    indexing:
      readme_index_table: true
      rule: "变更微服务时同步 APP.service_ids、AGG.implemented_by_service_ids"

  - key: "api"
    code: "API"
    order: 4
    entity_kind: "api_endpoint"
    id_pattern: "API-{ID}"
    parent:
      field: "parent_ms_id"
      expects: "MS-{ID}"
    additional_parent:
      field: "parent_app_id"
      expects: "APP-{ID}"
    tree:
      child_directory_glob: null
    artifacts:
      manifest_entry: "manifest/OpenAPI 中的 path item"
    fields:
      http_method: "HTTP 方法（若适用）"
      path: "路由 path（若适用）"
      idempotency: "幂等建议（可选）"
    indexing:
      readme_index_table: true
      rule: "变更 API 时同步 manifest、网关路由与 product 侧 ID"

indexing:
  readme_index_table: true
  rule: "任一 layer 变更时，更新本文件、README.md 技术索引表、manifest/OpenAPI 与必要的根 INDEX"
