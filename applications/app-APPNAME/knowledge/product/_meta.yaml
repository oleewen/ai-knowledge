# applications/app-APPNAME/knowledge/product 目录元数据
id: "DIR-APP-APPNAME-KNOWLEDGE-PRODUCT"
name: "产品视角（applications/app-APPNAME/knowledge/product）"
description: "app-APPNAME 应用级产品视角：沉淀与该应用相关的产品模块、功能点与用例等需求规格，并与业务/技术视角通过 ID 显式关联。"

role:
  perspective: "product"
  is_system_level_index: false

inputs:
  - path: "../constitution/"
    description: "命名规范、术语与治理约束（应用侧继承系统规范）"
  - path: "../../../system/knowledge/product/"
    description: "系统级产品视角规范与索引参考"
  - path: "(from-solution-analysis-delivery)"
    description: "解决方案/需求分析/交付沉淀的产品能力与验收标准（归档回写）"

outputs:
  primary_artifact:
    pattern: "{PM-ID}/, {PM-ID}/_meta.yaml, {PM-ID}/features/{FT-ID}.yaml"
    description: "产品模块目录与功能点定义（应用侧按模块聚焦）"

naming_conventions:
  hierarchy:
    description: "产品模块 (PM) → 功能 (FT) → 用例 (UC)"
  key_fields:
    product_module:
      - "relies_on_context_ids"
    feature:
      - "invokes_api_ids"
      - "realizes_use_case_ids"

indexing:
  readme_index_table: true
  rule: "新增/调整 PM/FT 时，应同步维护 README.md 的产品索引"

integration:
  mappings:
    - "产品 → 业务：PM 的 relies_on_context_ids 指向 business 的 BC"
    - "产品 → 技术：FT 的 invokes_api_ids 指向 technical 的 API（来自应用级 manifest）"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段约定"
  - path: "../../INDEX.md"
    description: "applications 全局索引与导航"
  - path: "../../../system/DESIGN.md"
    description: "系统级目录结构与元模型规范"
