# ENT-T_ORDER_ITEMS 数据实体定义
id: "ENT-T_ORDER_ITEMS"
name: "订单项表 (order_items)"
description: "订单明细行，与 orders 主表关联"
fields:
  - name: "id"
    type: "bigint"
    is_primary: true
    description: "订单项ID"
  - name: "order_id"
    type: "bigint"
    description: "订单ID，关联 orders.id"
  - name: "product_id"
    type: "bigint"
    description: "商品ID"
  - name: "sku_code"
    type: "varchar(50)"
    description: "SKU编码"
  - name: "product_name"
    type: "varchar(200)"
    description: "商品名称快照"
  - name: "unit_price"
    type: "bigint"
    description: "单价(分)快照"
  - name: "quantity"
    type: "int"
    description: "数量"
  - name: "subtotal"
    type: "bigint"
    description: "小计(分)"
# 从属于订单聚合，不单独映射聚合根；通过 order_id 关联 ENT-T_ORDER / AGG-ORDER
