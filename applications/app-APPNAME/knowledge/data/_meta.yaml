# 模板示例
# applications/app-APPNAME/knowledge/data 目录元数据
id: "DIR-APP-APPNAME-KNOWLEDGE-DATA"
name: "数据视角（applications/app-APPNAME/knowledge/data）"
description: "app-APPNAME 应用级数据视角：沉淀该应用相关的数据存储、数据实体与治理属性，并与业务聚合、技术应用/微服务建立映射。"

role:
  perspective: "data"
  is_system_level_index: false

inputs:
  - path: "../constitution/"
    description: "命名规范、术语与治理约束（含敏感级别治理约定）"
  - path: "../../../system/knowledge/data/"
    description: "系统级数据视角规范与索引参考"
  - path: "(from-app-repos-and-databases)"
    description: "应用侧数据结构、迁移与运行数据治理实践（通过交付/归档沉淀）"

outputs:
  primary_artifact:
    pattern: "{DS-ID}/, {DS-ID}/_meta.yaml, {DS-ID}/schema/{ENT-ID}.yaml"
    description: "数据存储目录与元数据、数据实体定义（ENT YAML）"
  architecture_docs:
    - path: "./DATA-ARCHITECTURE.md"
      description: "数据架构总览（如存在）"

naming_conventions:
  hierarchy:
    description: "数据存储 (DS) → 数据实体 (ENT)"
  key_fields:
    data_store_meta:
      - "app_id"
    data_entity:
      - "maps_to_aggregate_id"

indexing:
  readme_index_table: false
  note: "本视角 README 描述结构、映射字段与示例入口；目录内条目以 DS/ENT 分层组织"

integration:
  mappings:
    - "数据 ← 业务：AGG 的 persisted_as_entity_ids 指向 ENT；ENT 的 maps_to_aggregate_id 指回 AGG"
    - "数据 ← 技术：DS 的 app_id/owned_by_app_id 指向 technical 的 APP/MS"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段约定"
  - path: "../../INDEX.md"
    description: "applications 全局索引与导航"
  - path: "../../../system/DESIGN.md"
    description: "系统级目录结构与元模型规范"
