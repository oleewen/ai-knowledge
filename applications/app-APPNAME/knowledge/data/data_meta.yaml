# 应用知识库根目录/knowledge/data 目录元数据
id: "DIR-KNOWLEDGE-DATA"
name: "数据视角（knowledge/data）"
description: "系统级数据视角：描述数据存储结构、数据实体与治理属性（如敏感级别、归属）；并与业务、技术视角通过显式 ID 字段建立映射。"

role:
  perspective: "data"
  is_system_level_index: true

inputs:
  - path: "../constitution/"
    description: "命名规范、术语与治理约束（含敏感级别治理约定）"
  - path: "(from-app-data-schemas)"
    description: "应用侧数据结构与变更（通过交付与归档回写/同步）"

outputs:
  primary_artifact:
    pattern: "data_meta.yaml, DS_meta.yaml, {ENT-ID}_ENT_meta.yaml；{DS-ID}/ 作数据存储层级锚点（可含 README）"
    description: "数据视角元数据与 DS/ENT 定义（YAML）集中于本目录根；子目录仅作存储导航"
  architecture_docs:
    - path: "./DATA-ARCHITECTURE.md"
      description: "数据架构总览（如存在）"

naming_conventions:
  hierarchy:
    description: "数据存储 (DS) → 数据实体 (ENT)"
  directories:
    ds: "{DS-ID}/"
  meta_files_in_data_root:
    perspective: "data_meta.yaml"
    data_store: "DS_meta.yaml"
    entity: "{ENT-ID}_ENT_meta.yaml"

indexing:
  readme_index_table: true
  rule: "新增/调整 DS 或 ENT 时，应同步维护 README.md 的数据索引表与必要的全局索引"

integration:
  mappings:
    - "数据 ← 业务：AGG 的 persisted_as_entity_ids 指向 ENT；ENT 的 maps_to_aggregate_id 指回 AGG"
    - "数据 ← 技术：DS 的 owned_by_app_id（或 app_id）指向 technical 的 APP/MS"
  key_fields:
    data_store_meta:
      - "owned_by_app_id"
    data_entity:
      - "maps_to_aggregate_id"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段约定"
  - path: "../../INDEX.md"
    description: "本应用索引与映射速查"
  - path: "../../../../system/DESIGN.md"
    description: "目录结构与元模型规范"
