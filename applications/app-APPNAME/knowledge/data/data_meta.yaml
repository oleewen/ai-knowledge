# knowledge/data — 视角元数据（SSOT）
schema_version: "1.1"

identity:
  id: "DIR-KNOWLEDGE-DATA"
  name: "数据视角（knowledge/data）"
  description: "数据版图：DS→ENT；实体落盘于 data_knowledge.json。"

role:
  perspective: "data"
  is_system_level_index: true

repository:
  root_relative: "knowledge/data"
  child_files:
    - "README.md"
    - "data_knowledge.json"
  hierarchy:
    chain: "DS → ENT"
    storage: "virtual_json"

integration:
  cross_perspective:
    - { from: "business.AGG.persisted_as_entity_ids", to: "ENT.id" }
    - { from: "ENT.cross_references.business", to: "business.AGG" }
    - { from: "DS.owned_by_app_id", to: "technical.APP" }
  key_fields:
    DS: ["config_key", "type", "owned_by_app_id"]
    ENT: ["logical_name", "physical_table", "parent_id"]

references:
  - { path: "./README.md", note: "人类可读说明" }
  - { path: "./data_knowledge.json", note: "扁平实体" }
  - { path: "../../INDEX_GUIDE.md", note: "联邦索引" }

layers:
  - { key: ds, code: DS, order: 1, id_pattern: "DS-{NAME}", parent: null }
  - { key: ent, code: ENT, order: 2, id_pattern: "ENT-{NNN}", parent: DS }

indexing:
  readme_index_table: true
  sync: "变更 ID 时同步 README、KNOWLEDGE_INDEX.md（按需）"
