# docs/knowledge — 知识树元数据（联邦单元）
schema_version: "1.1"

id: "DIR-KNOWLEDGE"
name: "应用知识库（knowledge）"
description: "宪法层 + 四视角；与 knowledge-extract 产物对齐，可与中央库 ID 对齐。"

child_directories:
  - constitution
  - business
  - product
  - technical
  - data
child_files:
  - README.md

role:
  is_single_source_of_truth: true
  perspectives:
    - constitution
    - business
    - product
    - technical
    - data

indexing:
  application_index:
    path: ../INDEX_GUIDE.md
  per_perspective_readmes:
    - ./constitution/README.md
    - ./business/README.md
    - ./product/README.md
    - ./technical/README.md
    - ./data/README.md

references:
  - ./README.md
  - ../INDEX_GUIDE.md
  - ../../README.md
  - ../../AGENTS.md

# knowledge-extract：项目级覆盖（可选）
knowledge:
  schema_version: "1.1"
  meta_read_order:
    paths:
      - application_meta.yaml
      - knowledge/knowledge_meta.yaml
      - knowledge/business/business_meta.yaml
      - knowledge/product/product_meta.yaml
      - knowledge/technical/technical_meta.yaml
      - knowledge/data/data_meta.yaml
      - requirements/requirements_meta.yaml
      - changelogs/changelogs_meta.yaml
