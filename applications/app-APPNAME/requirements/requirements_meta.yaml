# 应用知识库根目录/requirements — requirements_meta.yaml（目录元数据）
id: "DIR-APP-APPNAME-REQUIREMENTS"
name: "应用需求交付（requirements）"
description: "应用知识库根目录下的应用级需求交付产物目录：将上游 analysis 输出的高层次需求按 MVP/阶段拆分为可执行交付包 REQUIREMENT-{ID}/，沉淀 PRD/ADD/TDD 等文档；上游文档常位于中央库 system/analysis、system/solutions。"

stage:
  sdd_phase: "requirements"

inputs:
  - path: "../../../system/analysis/"
    description: "中央库需求分析文档（REQUIREMENT-{ID}.md），可选"
  - path: "../../../system/solutions/"
    description: "中央库解决方案文档（SOLUTION-{ID}.md），可选"
  - path: "../../../.ai/rules/requirement/"
    description: "PRD/ADD/TDD 等模板与规范"

outputs:
  primary_artifact:
    pattern: "REQUIREMENT-{ID}/"
    description: "需求交付包目录（按阶段组织 PRD/ADD/TDD 等交付物）"
  phase_artifacts:
    pattern: "REQUIREMENT-{ID}/MVP-Phase-*/{PRD,ADD,TDD}.md"
    description: "单阶段核心交付文档（可按需扩展 SPEC/DEV 等）"

naming_conventions:
  directory:
    pattern: "REQUIREMENT-{ID}/"
  phases:
    pattern: "MVP-Phase-{N}/"
  documents:
    recommended:
      - "PRD.md"
      - "ADD.md"
      - "TDD.md"

indexing:
  example_reference:
    path: "./REQUIREMENT-EXAMPLE/"
    description: "需求交付结构示例，可复制后改名为 REQUIREMENT-{ID}/"

integration:
  traceability:
    - "交付包应与上游 analysis/REQUIREMENT-{ID}.md、solutions/SOLUTION-{ID}.md 通过 ID 关联（可在中央库 system/ 中）"
  upstream_dirs:
    - "../../../system/analysis/"
    - "../../../system/solutions/"

references:
  - path: "./README.md"
    description: "本阶段目标、结构与工作流说明"
  - path: "./REQUIREMENT-EXAMPLE/README.md"
    description: "示例交付包说明"
  - path: "../../../system/DESIGN.md"
    description: "全局目录结构与阶段设计"
  - path: "../INDEX.md"
    description: "本应用索引"
