# 应用知识库根目录/changelogs — changelogs_meta.yaml（目录元数据）
id: "DIR-APP-APPNAME-CHANGELOGS"
name: "应用变更日志（应用知识库根目录/changelogs）"
description: "应用级变更沉淀目录；记录本应用 knowledge / requirements 等文档演进（CHANGELOG.md），结构与中央库 system/changelogs 对齐。"

stage:
  sdd_phase: "changelogs"
  supports_phases:
    - "knowledge"
    - "requirements"

inputs:
  - path: "../knowledge/"
    description: "应用知识库条目变更"
  - path: "../requirements/"
    description: "应用需求交付里程碑与交付变更"
  - path: "../../../system/changelogs/"
    description: "中央库变更日志（对照与归档上行参考）"

outputs:
  primary_artifact:
    path: "./CHANGELOG.md"
    description: "应用级变更日志"

integration:
  archive_feedback_loop:
    description: "需求归档 / 知识回写时同步更新 changelogs；必要时摘要同步中央库"

references:
  - path: "../../../system/DESIGN.md"
    description: "全局目录结构与 changelogs 定位约定"
  - path: "../INDEX.md"
    description: "本应用索引"
