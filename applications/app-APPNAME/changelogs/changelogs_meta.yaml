# applications/app-APPNAME/changelogs — 单文件 SSOT（模板；对照 system/changelogs/changelogs_meta.yaml）
schema_version: "1.1"

identity:
  id: DIR-CHANGELOGS-APP
  name: 变更日志（应用）
  description: CHANGELOG.md 与可选 document-change / document-indexing 产物。

role:
  stage: changelogs
  sdd_phase: changelogs
  is_system_level_index: false
  supports_phases:
    - knowledge
    - solution
    - analysis
    - requirements

repository:
  root_relative: changelogs
  child_directories: []
  child_files:
    - README.md
    - CHANGELOG.md
  directory_patterns:
    human: CHANGELOG.md
    optional_json: changes-index.json
    optional_md: changes-index.md
    optional_jsonl: indexing-log.jsonl

pipeline:
  inputs:
    - path: ../knowledge/
      description: 应用知识库变更
    - path: ../requirements/
      description: 需求交付变更
  outputs:
    ssot_file: changelogs_meta.yaml

integration:
  traceability:
    - 归档或知识回写时同步 CHANGELOG 条目

references:
  - ./README.md
  - ../../../INDEX_GUIDE.md
  - ../../../README.md
  - ../../../AGENTS.md

layers:
  - key: human
    code: CHANGELOG
    order: 1
    artifacts:
      markdown: CHANGELOG.md
  - key: index_ops
    code: INDEX_OPS
    order: 2
    artifacts:
      optional:
        - changes-index.json
        - changes-index.md
        - indexing-log.jsonl

indexing:
  readme_index_table: true
  rule: 影响导航或约定时更新 CHANGELOG 与本文件（若扩展 layers）
