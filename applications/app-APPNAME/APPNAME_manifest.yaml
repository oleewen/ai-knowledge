# 机器可读目录清单（与 application_meta.yaml 互补）
schema_version: "1.1"
template_id: app-APPNAME
description: 联邦单元目录布局与中央库 system/ 下对应物对照

mirrors_system_paths:
  - system/changelogs/changelogs_meta.yaml → changelogs/changelogs_meta.yaml
  - system/knowledge/** → knowledge/**
  - system/requirements/requirements_meta.yaml → requirements/requirements_meta.yaml
  - system/system_meta.yaml → application_meta.yaml（语义对照）

central_library:
  system_root: ../../system/
  repository_root: ../../
