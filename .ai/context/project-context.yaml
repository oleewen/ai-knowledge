# 项目上下文策略
# 与 docs/README.md 文档结构、各阶段输入输出规范对齐

context_strategy:
  # 第一层：全局上下文（始终加载）
  global:
    - "docs/README.md"                                    # 文档体系与目录规范
    - "docs/instructions/architecture/SYSTEM-ARCHITECTURE.md"
    - "docs/instructions/architecture/DATA-ARCHITECTURE.md"
    - "docs/instructions/architecture/DEPLOYMENT-ARCHITECTURE.md"
    - "docs/instructions/domain/DOMAIN-OVERVIEW.md"
    - "docs/instructions/domain/BOUNDED-CONTEXTS.md"
    - "docs/instructions/domain/DOMAIN-MODEL.md"
    - "docs/instructions/product/PRODUCT-OVERVIEW.md"
    - "docs/instructions/product/FEATURE-MAP.md"
    - "docs/instructions/product/USER-GUIDE.md"
    - "docs/instructions/api/API-OVERVIEW.md"
    - "docs/instructions/test/TEST-STRATEGY.md"
    - "docs/instructions/test/TEST-COVERAGE.md"
    - ".ai/context/project-context.yaml"

  # 第二层：阶段上下文（按当前阶段加载）
  stage:
    solution:
      description: "解决方案阶段"
      inputs:
        - "业务描述/需求原文"
        - "docs/instructions/**"
        - "specs/**"
        - "docs/solutions/archive/**"
      outputs:
        - "docs/solutions/SOLUTION-{ID}.md"

    requirement_analysis:
      description: "需求分析阶段"
      inputs:
        - "docs/solutions/SOLUTION-{ID}.md"
        - "docs/instructions/**"
        - "specs/**"
      outputs:
        - "docs/analysis/REQUIREMENT-{ID}.md"

    product_design:
      description: "产品需求阶段（当前 MVP）"
      inputs:
        - "docs/analysis/REQUIREMENT-{ID}.md（当前 MVP 章节）"
        - "docs/instructions/product/**"
      outputs:
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"

    technical_design:
      description: "方案设计阶段（当前 MVP）"
      inputs:
        - "docs/analysis/REQUIREMENT-{ID}.md"
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"
        - "docs/instructions/architecture/**"
        - "docs/instructions/domain/**"
        - "specs/**"
      outputs:
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/TDD-{ID}.md"
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"

    development:
      description: "需求开发阶段（当前 MVP）"
      inputs:
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/ADD-{ID}.md"
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/TDD-{ID}.md"
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"
        - "specs/**"
        - "src/**"
      outputs:
        - "src/**"
        - "docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/DEV-{ID}.md"
        - "docs/instructions/**（如有更新）"
        - "specs/**（同步）"

    documentation_curation:
      description: "需求归档阶段"
      inputs:
        - "docs/requirements/REQUIREMENT-{ID}/**"
        - "docs/instructions/**"
        - "docs/changelog/**"
        - "specs/**"
        - "src/**"
      outputs:
        - "docs/changelog/changes/CHANGE-{ID}.md"
        - "docs/changelog/CHANGELOG.md"
        - "docs/instructions/**（更新）"

  # 第三层：按需上下文（Agent 主动检索）
  on_demand:
    strategy: "RAG + 精准文件引用"
    description: "Agent 在工作过程中根据需要主动检索和加载额外上下文"
    methods:
      - "基于关键词的文档检索"
      - "基于依赖关系的规约追溯"
      - "基于服务调用链的代码追溯"
    reference_rules:
      cross_reference:
        - "使用相对路径引用同项目文档"
        - "使用文档 ID 引用（如 PRD-001、TDD-001）"
        - "引用时注明版本号"
      traceability:
        - "PRD 引用需求来源"
        - "ADD 引用 PRD"
        - "TDD 引用 PRD 与 ADD"
        - "代码注释引用 TDD 中的设计章节"
        - "测试代码引用 TDD 中的测试用例编号"
        - "规约文件引用对应的设计文档"

  # 质量门禁与文档编码（与 docs/README.md 2.2、2.4 对齐）
  quality_gates:
    requirement_analysis: "需求完整性、一致性、用户故事可验证性、MVP 划分合理性"
    technical_design: "设计与需求可追溯性、设计完整性、架构一致性、规约完整性、测试计划覆盖度"
    development: "代码质量、测试覆盖率与通过率、P0/P1 缺陷清零、文档同步"

  document_ids:
    solution: "SOLUTION-{YYYYMMDD}-{SEQ}"
    requirement: "REQUIREMENT-{YYYYMMDD}-{SEQ}"
    prd: "PRD-{REQUIREMENT-ID}-MVP{N}"
    add: "ADD-{REQUIREMENT-ID}-MVP{N}"
    tdd: "TDD-{REQUIREMENT-ID}-MVP{N}"
    dev: "DEV-{REQUIREMENT-ID}-MVP{N}"
    change: "CHANGE-{YYYYMMDD}-{SEQ}"
