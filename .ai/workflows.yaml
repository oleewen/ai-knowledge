# AI SDD 工作流定义
# 与 AGENTS.md、knowledge/solutions、knowledge/analysis、docs/requirements/* 阶段规范对齐
#
# 主链路：解决方案 → 需求分析 → 需求交付（产品需求→方案设计→需求开发）×MVP → 需求归档

# Agent 协作拓扑
#
#                         ┌──────────────────┐
#                         │   Orchestrator   │
#                         │  (工作流编排)     │
#                         └────────┬─────────┘
#                                  │
#               ┌──────────────────┼──────────────────┐
#               │                  │                  │
#               ▼                  ▼                  ▼
#      ┌────────────────┐ ┌───────────────┐ ┌────────────────┐
#      │Quality Guardian│ │   阶段 Agent   │ │ Documentation   │
#      │  Quality Eng   │ │   (按阶段)     │ │    Curator      │
#      │ 贯穿全流程     │ │ 解决方案分析   │ │ 需求归档时更新   │
#      │ 质量/测试门禁  │ │ 需求分析       │ │ 系统文档        │
#      └────────────────┘ │ 产品设计       │ └────────────────┘
#                         │ 架构/详细设计   │
#                         │ 文档/规约输出   │
#                         │ 开发/审查      │
#                         └───────────────┘

workflows:
  # ----- 解决方案阶段 -----
  solution_phase:
    description: "需求提取→影响面评估→冲突识别→方案制定→文档输出与评审"
    quality_gate: "solution_quality_gate（完整性、一致性、可行性、可追溯性）"
    steps:
      - name: requirement_extraction
        agent: solution_analyst
        description: "需求提取与结构化"
        input: ["业务描述/需求原文", "knowledge/**", "specs/**"]
        output: ["结构化需求提取报告"]
      - name: impact_assessment
        agents: ["solution_analyst", "quality_guardian"]
        description: "影响面评估与分析"
        input: ["结构化需求", "knowledge/**", "specs/**"]
        output: ["影响面评估报告"]
      - name: conflict_detection
        agent: solution_analyst
        description: "冲突识别与化解"
        input: ["结构化需求", "影响面评估", "现有业务规则"]
        output: ["冲突分析报告"]
      - name: solution_formulation
        agent: solution_analyst
        description: "方案制定与评估"
        input: ["结构化需求", "影响面评估", "冲突分析"]
        output: ["解决方案核心内容"]
      - name: documentation_review
        agents: ["technical_writer", "doc_updater"]
        description: "文档输出与评审"
        input: ["解决方案核心内容"]
        output: ["solutions/SOLUTION-{ID}.md"]

  # ----- 需求分析阶段 -----
  requirement_analysis_phase:
    description: "深度研究与探索→需求细化与建模→MVP拆分与规划→依赖分析与风险评估→文档输出与评审"
    quality_gate: "requirement_quality_gate（可追溯性、完整性、可行性、一致性）"
    steps:
      - name: deep_research
        agent: requirement_analyst
        description: "深度研究与探索"
        input: ["solutions/SOLUTION-{ID}.md", "knowledge/**", "specs/**"]
        output: ["深度研究报告"]
      - name: requirement_refinement
        agent: requirement_analyst
        description: "需求细化与建模"
        input: ["解决方案文档", "深度研究报告"]
        output: ["细化需求清单"]
      - name: mvp_planning
        agent: requirement_analyst
        description: "MVP 拆分与规划"
        input: ["细化需求清单", "解决方案 MVP 建议"]
        output: ["MVP 拆分方案"]
      - name: dependency_risk_analysis
        agents: ["requirement_analyst", "quality_guardian"]
        description: "依赖分析与风险评估"
        input: ["MVP 拆分方案"]
        output: ["依赖与风险评估报告"]
      - name: documentation_review
        agents: ["technical_writer", "doc_updater"]
        description: "文档输出与评审"
        input: ["深度研究", "细化需求", "MVP 方案", "依赖风险"]
        output: ["analysis/REQUIREMENT-{ID}.md"]

  # ----- 需求交付 - 产品需求阶段 -----
  product_design_phase:
    description: "业务流程设计→用户故事与场景→用例建模→功能模块与交互设计→文档输出与评审"
    quality_gate: "product_quality_gate（可追溯性、完整性、一致性）"
    steps:
      - name: business_flow_design
        agent: product_designer
        description: "业务流程设计"
        input: ["analysis/REQUIREMENT-{ID}.md（当前 MVP 章节）", "knowledge/product/**"]
        output: ["核心/分支/异常/跨系统流程"]
      - name: user_story_scenarios
        agent: product_designer
        description: "用户故事与场景"
        input: ["业务流程"]
        output: ["用户故事与验收标准"]
      - name: use_case_modeling
        agent: product_designer
        description: "用例建模"
        input: ["用户故事"]
        output: ["用例图与用例描述"]
      - name: feature_interaction_design
        agent: product_designer
        description: "功能模块与交互设计"
        input: ["用例模型"]
        output: ["功能模块、交互设计、业务规则汇总"]
      - name: documentation_review
        agents: ["technical_writer", "doc_updater"]
        description: "文档输出与评审"
        input: ["上述 1～4 步产出"]
        output: ["docs/requirements/REQUIREMENT-{ID}/MVP-Phase-{N}/PRD-{ID}.md"]

  # ----- 需求交付 - 方案设计阶段 -----
  technical_design_phase:
    description: "架构设计→详细设计→规约生成→测试计划制定→文档输出与评审"
    quality_gate: "design_quality_gate（可追溯性、完整性、一致性、可行性）"
    steps:
      - name: architecture_design
        agents: ["architect"]
        description: "架构设计"
        input: ["PRD", "knowledge/technical/**", "knowledge/constitution/adr/**", "knowledge/business/**"]
        output: ["系统架构、接口协议、领域模型、数据架构、发布方案"]
      - name: detailed_design
        agent: backend_architect
        description: "详细设计"
        input: ["PRD", "ADD 架构部分", "knowledge/technical/**", "knowledge/constitution/adr/**", "specs/**", "src/**"]
        output: ["集成设计、接口详细设计、逻辑设计、数据访问、非功能性设计"]
      - name: spec_generation
        agents: ["technical_writer", "doc_updater"]
        description: "规约文件生成"
        input: ["ADD 完整版"]
        output: ["REQUIREMENT-{ID}/MVP-Phase-{N}/specs/{service-name}/api|domain|data|integration/"]
      - name: test_planning
        agents: ["quality_guardian", "quality_engineer"]
        description: "测试计划制定"
        input: ["PRD", "ADD", "规约文件"]
        output: ["测试策略、测试用例、测试数据、回归范围"]
      - name: documentation_review
        agents: ["technical_writer", "doc_updater"]
        description: "文档输出与评审"
        input: ["1～4 步产出"]
        output: ["ADD-{ID}.md", "TDD-{ID}.md", "规约 YAML"]

  # ----- 需求交付 - 需求开发阶段 -----
  development_phase:
    description: "开发准备→编码实现→测试验证→代码审查→文档更新"
    quality_gate: "delivery_checklist（代码质量、测试质量、交付质量、文档、部署）"
    steps:
      - name: development_preparation
        agents: ["developer", "database_reviewer"]
        description: "开发准备"
        input: ["ADD", "TDD", "REQUIREMENT-{ID}/MVP-Phase-{N}/specs/**"]
        output: ["SDD Spec 与任务清单"]
      - name: coding_implementation
        agents: ["developer", "code_reviewer", "tdd_guide"]
        description: "编码实现"
        input: ["任务清单", "ADD", "TDD", "specs", "src/**"]
        output: ["生产代码", "单元测试"]
      - name: test_verification
        agents: ["developer", "quality_engineer"]
        description: "测试验证"
        input: ["代码", "TDD", "测试计划"]
        output: ["测试报告（写入 DEV-{ID}.md）"]
      - name: code_review
        agents: ["code_reviewer", "security_reviewer"]
        description: "代码审查"
        input: ["src/**", "ADD", "TDD"]
        output: ["审查结果（写入 DEV-{ID}.md）"]
      - name: documentation_update
        agents: ["doc_updater", "developer"]
        description: "文档更新"
        input: ["交付代码与规约", "knowledge/**", "specs/**"]
        output: ["knowledge/** 更新（如需要）", "specs/** 同步", "CHANGELOG", "DEV-{ID}.md 总结"]

  # ----- 需求归档阶段 -----
  documentation_curation_phase:
    description: "生成需求变更记录，更新 CHANGELOG，同步产品/架构/API/测试文档"
    steps:
      - name: changelog_generation
        agent: documentation_curator
        input: ["docs/requirements/REQUIREMENT-{ID}/**", "docs/changelog/**", "specs/**"]
        output: ["docs/changelog/changes/CHANGE-{ID}.md", "docs/changelog/CHANGELOG.md"]
      - name: doc_sync
        agent: documentation_curator
        input: ["knowledge/**", "specs/**", "src/**"]
        output: ["knowledge/product/** 或 knowledge/technical/** 更新"]

  # ----- 主链路顺序 -----
  main_pipeline:
    - solution_phase
    - requirement_analysis_phase
    - product_design_phase   # 按 MVP 循环
    - technical_design_phase
    - development_phase
    - documentation_curation_phase
