# system/requirements — 单文件 SSOT
schema_version: "1.1"

identity:
  id: DIR-REQUIREMENTS
  name: 需求交付
  description: >
    REQUIREMENT-{IDEA-ID}/ 内 PRD/ADD/TDD 等；目录名与 ANALYSIS-{IDEA-ID}.md、PRD-* 同属 *-{IDEA-ID}（IDEA-ID 定义见 ../knowledge/constitution/standards/naming-conventions.md）。

role:
  stage: requirements
  sdd_phase: requirements
  is_system_level_index: true

repository:
  root_relative: requirements
  child_directories:
    - REQUIREMENT-{IDEA-ID}
  child_files:
    - README.md
  directory_patterns:
    REQUIREMENT: REQUIREMENT-{IDEA-ID}/
    MVP_PHASE: REQUIREMENT-{IDEA-ID}/MVP-Phase-{N}/

pipeline:
  inputs:
    - path: ../../system/analysis/
      description: 中央库 ANALYSIS-{IDEA-ID}.md（可选）
    - path: ../../system/solutions/
      description: 中央库 SOLUTION-{IDEA-ID}.md（可选）
  outputs:
    ssot_file: requirements_meta.yaml

integration:
  traceability:
    - 交付包目录 REQUIREMENT-{IDEA-ID} 与 ANALYSIS-{IDEA-ID}.md 共用同一 IDEA-ID
    - PRD parent → 对应 ANALYSIS 或 REQUIREMENT 标识；ADD/TDD parent → 对应 PRD

references:
  - ./README.md
  - ../INDEX_GUIDE.md
  - ../../README.md
  - ../../.agent/skills/sdx-prd/assets/prd-template.md
  - ../../.agent/skills/sdx-design/assets/add-template.md
  - ../../.agent/skills/sdx-test/assets/tdd-template.md

layers:
  - key: req
    code: REQUIREMENT
    order: 1
    entity_kind: requirement_package
    id_pattern: REQUIREMENT-{IDEA-ID}
    parent: null
    tree:
      child_directory_glob: MVP-Phase-{N}/
    artifacts:
      markdown: REQUIREMENT-{IDEA-ID}.md
    indexing:
      readme_index_table: true

  - key: mvp_phase
    code: MVP_PHASE
    order: 2
    entity_kind: mvp_phase
    id_pattern: MVP-Phase-{N}
    parent:
      field: requirement_id
      expects: REQUIREMENT-{IDEA-ID}
    artifacts:
      fixed_filenames:
        - PRD.md
        - ADD.md
        - TDD.md
    frontmatter_constraints:
      PRD.md: "需 id、parent、mvp_phase；parent 与 REQUIREMENT-{IDEA-ID} 或 ANALYSIS-{IDEA-ID} 可追溯一致"
      ADD.md: "需 id、parent；parent 指向对应 PRD"
      TDD.md: "需 id、parent；parent 指向对应 PRD"
    indexing:
      readme_index_table: false

indexing:
  readme_index_table: true
  rule: 变更交付包或阶段时同步 README、INDEX_GUIDE（按需）
