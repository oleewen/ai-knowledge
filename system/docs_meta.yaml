# application/ 目录元数据（根导航与 SSOT 指针）
id: "DIR-SYSTEM"
name: "应用知识库根（application）"
description: "企业级知识库 application/ 根目录：人类与 Agent 的主导航（README、INDEX_GUIDE）、设计约束（DESIGN、CONTRIBUTING）及 SDD 各阶段与 knowledge SSOT。"

role:
  kind: "documentation_root"
  ssot_subdirectory: "knowledge/"
  # 宪法层 SSOT 目录为 constitution/（与 knowledge/ 平级）；命名与 ADR 规约见该树

child_directories:
  constitution:
    meta: "constitution/constitution_meta.yaml"
    description: "宪法层：术语、原则、标准、ADR（与 knowledge/ 平级）"
  knowledge:
    meta: "knowledge/knowledge_meta.yaml"
    description: "四视角业务 / 产品 / 技术 / 数据（SSOT）"
  solutions:
    meta: "solutions/solutions_meta.yaml"
  analysis:
    meta: "analysis/analysis_meta.yaml"
  requirements:
    meta: "requirements/requirements_meta.yaml"
  changelogs:
    meta: "changelogs/changelogs_meta.yaml"

child_files:
  - "README.md"
  - "INDEX_GUIDE.md"
  - "DESIGN.md"
  - "CONTRIBUTING.md"

inputs:
  - path: "(from-repository-and-delivery)"
    description: "仓库治理、方案/分析/交付产出与归档回写"

outputs:
  primary_artifact:
    pattern: "README.md, INDEX_GUIDE.md, DESIGN.md, CONTRIBUTING.md, */{dirname}_meta.yaml, constitution/**/*, knowledge/**/*"
    description: "child_files（根级）+ child_directories 的 {dirname}_meta.yaml + constitution/ 与 knowledge/ 树实体"

naming_conventions:
  directory_index:
    description: "各一级子目录使用与目录同名的 {dirname}_meta.yaml；knowledge/ 根另见 knowledge_meta.yaml"
    reference: "./constitution/standards/naming-conventions.md"

integration:
  upstream:
    - path: "../.agent/"
      description: "规范、模板与 Agent 技能（非 application 内必存路径）"
  traceability:
    description: "阶段链 solutions → analysis → requirements；规约落在需求包内 specs/ 或 knowledge/technical/；knowledge 为事实源，归档可回写"

references:
  - path: "./README.md"
  - path: "./INDEX_GUIDE.md"
  - path: "./DESIGN.md"
  - path: "./CONTRIBUTING.md"
