# 模板示例
# system/knowledge/data 目录元数据
id: "DIR-KNOWLEDGE-DATA"
name: "数据视角（knowledge/data）"
description: "系统级数据视角：描述数据存储结构、数据实体与治理属性（如敏感级别、归属）；并与业务、技术视角通过显式 ID 字段建立映射。"

role:
  perspective: "data"
  is_system_level_index: true

inputs:
  - path: "../constitution/"
    description: "命名规范、术语与治理约束（含敏感级别治理约定）"
  - path: "(from-app-data-schemas)"
    description: "应用侧数据结构与变更（通过交付与归档回写/同步）"

outputs:
  primary_artifact:
    pattern: "{DS-ID}/, {DS-ID}/_meta.yaml, {DS-ID}/schema/{ENT-ID}.yaml"
    description: "数据存储目录与元数据、数据实体定义（ENT YAML）"
  architecture_docs:
    - path: "./DATA-ARCHITECTURE.md"
      description: "数据架构总览（如存在）"

naming_conventions:
  hierarchy:
    description: "数据存储 (DS) → 数据实体 (ENT)"
  store_directories:
    pattern: "{DS-ID}/"
  entity_files:
    pattern: "{DS-ID}/schema/{ENT-ID}.yaml"

indexing:
  readme_index_table: false
  note: "本视角 README 描述结构、映射字段与示例入口；目录内条目以 DS/ENT 分层组织"

integration:
  mappings:
    - "数据 ← 业务：AGG 的 persisted_as_entity_ids 指向 ENT；ENT 的 maps_to_aggregate_id 指回 AGG"
    - "数据 ← 技术：DS 的 app_id（或 owned_by 字段）指向 technical 的 APP/MS"
  key_fields:
    data_store_meta:
      - "app_id"
    data_entity:
      - "maps_to_aggregate_id"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段约定"
  - path: "../../INDEX.md"
    description: "全局索引与映射速查"
  - path: "../../DESIGN.md"
    description: "目录结构与元模型规范"
