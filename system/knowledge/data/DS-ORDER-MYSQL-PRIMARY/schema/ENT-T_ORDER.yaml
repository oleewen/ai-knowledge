# ENT-T_ORDER 数据实体定义
id: "ENT-T_ORDER"
name: "订单表 (t_order)"
description: "存储订单的主体信息"
fields:
  - name: "order_id"
    type: "varchar(64)"
    is_primary: true
    description: "全局唯一订单号"
  - name: "user_id"
    type: "varchar(64)"
    description: "下单用户ID"
    sensitivity: "L2"
  - name: "total_amount"
    type: "decimal(10,2)"
    description: "订单总金额"
maps_to_aggregate_id: "AGG-ORDER" # 映射到业务视角的聚合根
