# 模板示例
# system/knowledge/technical 目录元数据
id: "DIR-KNOWLEDGE-TECHNICAL"
name: "技术视角（knowledge/technical）"
description: "系统级技术视角：描述系统的物理实现、部署架构与服务接口；注册系统（SYS）、应用（APP）与微服务（MS）等实体，并承接应用级 manifest.yaml 的上报与索引。"

role:
  perspective: "technical"
  is_system_level_index: true

inputs:
  - path: "../business/"
    description: "业务视角（BC 的 implemented_by_app_id 指向本视角 APP）"
  - path: "../product/"
    description: "产品视角（FT 的 invokes_api_ids 指向应用级 manifest 中登记的 API）"
  - path: "(from-app-repos)"
    description: "应用级仓库的 /docs/manifest.yaml（CI/CD 抓取并用于一致性检查与更新）"

outputs:
  primary_artifact:
    pattern: "SYS-*/**/*.{yaml,md}, SYS-*/_meta.yaml"
    description: "系统目录、应用注册与架构说明（系统→应用→微服务）"
  architecture_docs:
    - path: "./SYSTEM-ARCHITECTURE.md"
      description: "系统/子系统职责、边界与关系总览"

naming_conventions:
  hierarchy:
    description: "系统 (SYS) → 应用 (APP) → 微服务 (MS)"
  system_directories:
    pattern: "{SYS-ID}/"
    description: "系统目录包含 _meta.yaml 与应用架构文档"
  application_registration:
    pattern: "{SYS-ID}/{APP-GROUP}/{APP-ID}.yaml"
    fields:
      required:
        - "id"
        - "name"
        - "description"
        - "repo_url"
        - "docs_manifest_path"
        - "service_ids"
      optional:
        - "owner_team"

indexing:
  readme_index_table: true
  rule: "新增/更新 SYS 或 APP 注册信息时，应同步维护 README.md 的技术索引表"

integration:
  mappings:
    - "技术 ← 业务：business 的 BC 通过 implemented_by_app_id 关联到 technical 的 APP"
    - "技术 ← 产品：product 的 FT 通过 invokes_api_ids 关联到应用级 manifest 的 API"
  manifest:
    field: "docs_manifest_path"
    description: "应用注册信息中记录应用级文档清单入口（通常 /docs/manifest.yaml）"
  cicd:
    description: "CI/CD 可抓取 manifest.yaml 更新本视角元数据并做一致性检查"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段"
  - path: "../../INDEX.md"
    description: "全局索引与映射速查"
  - path: "../../DESIGN.md"
    description: "目录结构与元模型规范"
