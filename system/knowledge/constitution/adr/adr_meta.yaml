# ADR 模板与落盘约定
schema_version: "1.1"

id: STD-ADR-TEMPLATE
name: ADR 编写约定
description: 架构决策记录结构、状态与文件命名；正文在 constitution/adr/。

role:
  kind: document_standard
  template_file: ./adr-template.md

outputs:
  primary_location:
    path: ./
  file_pattern:
    pattern: ADR-{序号}-{短标题}.md
    example: ADR-002-api-versioning.md

structure:
  sections:
    - title
    - status
    - context
    - decision
    - consequences

inputs:
  - ../standards/NAMING-CONVENTIONS.md
  - ../GLOSSARY.md

references:
  - ./adr-template.md
  - ./ADR-001-knowledge-repo-structure.md
