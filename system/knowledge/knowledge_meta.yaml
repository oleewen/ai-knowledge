# system/knowledge — knowledge_meta.yaml（目录元数据）
id: "DIR-KNOWLEDGE"
name: "系统知识库（knowledge）"
description: "SSOT：宪法层 + 四视角。阶段文档以此为输入，归档时可回写。"

child_directories:
  - "constitution"
  - "business"
  - "product"
  - "technical"
  - "data"
child_files:
  - "README.md"

role:
  is_single_source_of_truth: true
  perspectives:
    - "constitution"
    - "business"
    - "product"
    - "technical"
    - "data"

inputs:
  - path: "solutions/"
    description: "解决方案文档（SOLUTION-{ID}.md）"
  - path: "analysis/"
    description: "需求分析文档（ANALYSIS-{ID}.md）"
  - path: "requirements/"
    description: "需求交付文档（REQUIREMENT-{ID}.md）"
  - path: "changelogs/"
    description: "变更记录与索引运维（可选）"

outputs:
  primary_artifact:
    pattern: "*/README.md, *_meta.yaml, **/*.{yaml,md}"
    description: "按视角组织的知识条目（命名见各视角 README）"

naming_conventions:
  ids:
    description: "全局唯一前缀（BD/BSD/BC/AGG/AB、PL/PM/FT/UC、SYS/APP/MS/API、DS/ENT 等）"
    reference: "./constitution/standards/NAMING-CONVENTIONS.md"

indexing:
  system_index:
    path: "../INDEX.md"
    rule: "变更条目后按需更新 system/INDEX.md 与各视角 README"
  per_perspective_readmes:
    - "./constitution/README.md"
    - "./business/README.md"
    - "./product/README.md"
    - "./technical/README.md"
    - "./data/README.md"

integration:
  consumed_by:
    - path: "../solutions/"
    - path: "../analysis/"
    - path: "../requirements/"
    - path: "../changelogs/"

references:
  - path: "./README.md"
  - path: "../INDEX.md"
  - path: "../DESIGN.md"
  - path: "../CONTRIBUTING.md"
