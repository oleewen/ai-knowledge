# system/knowledge/product 目录元数据
id: "DIR-KNOWLEDGE-PRODUCT"
name: "产品视角（knowledge/product）"
description: "系统级产品视角：描述产品功能、用户故事与需求规格；以产品线/模块/功能点等结构沉淀需求，并通过显式 ID 与业务、技术视角建立映射。"

role:
  perspective: "product"
  is_system_level_index: true

inputs:
  - path: "../constitution/"
    description: "命名规范、术语与治理约束"
  - path: "(from-solution-analysis-delivery)"
    description: "解决方案/需求分析/交付沉淀的产品能力与验收标准（归档回写）"

outputs:
  primary_artifact:
    pattern: "product_meta.yaml, PL_meta.yaml, PM_meta.yaml, FT_meta.yaml；目录树 {PL-ID}/{PM-ID}/ 作层级锚点（可含 README、FEATURE-MAP 等）"
    description: "产品视角元数据与 PL/PM/FT 定义（YAML）集中于本目录根；子目录仅作产品线/模块导航"

naming_conventions:
  hierarchy:
    description: "产品线 (PL) → 产品模块 (PM) → 功能 (FT) → 用例 (UC)"
  directories:
    pl: "{PL-ID}/"
    pm: "{PL-ID}/{PM-ID}/"
  meta_files_in_product_root:
    perspective: "product_meta.yaml"
    pl: "PL_meta.yaml"
    pm: "PM_meta.yaml"
    feature: "FT_meta.yaml"

indexing:
  readme_index_table: true
  rule: "新增/调整 PL/PM/FT 时，应同步维护 README.md 的产品索引表与必要的全局索引"

integration:
  mappings:
    - "产品 → 业务：PM 的 relies_on_context_ids 指向 business 的 BC"
    - "产品 → 技术：FT 的 invokes_api_ids 指向 technical 的 API（来自应用级 manifest）"
  key_fields:
    product_module:
      - "relies_on_context_ids"
    feature:
      - "invokes_api_ids"
      - "realizes_use_case_ids"

references:
  - path: "./README.md"
    description: "本视角说明、层级结构与映射字段约定"
  - path: "../../INDEX.md"
    description: "全局索引与映射速查"
  - path: "../../DESIGN.md"
    description: "目录结构与元模型规范"
