# knowledge/product — 视角元数据（SSOT）
schema_version: "1.1"

identity:
  id: "DIR-KNOWLEDGE-PRODUCT"
  name: "产品视角（knowledge/product）"
  description: "产品版图：PL→PM→FT→UC；实体落盘于 product_knowledge.json。"

role:
  perspective: "product"
  is_system_level_index: true

repository:
  root_relative: "knowledge/product"
  child_files:
    - "README.md"
    - "product_knowledge.json"
  hierarchy:
    chain: "PL → PM → FT → UC"
    storage: "virtual_json"

integration:
  cross_perspective:
    - { from: "PM.cross_references.business", to: "business.BC/AGG" }
    - { from: "FT.invokes_api_ids", to: "technical.API" }
    - { from: "FT.realizes_use_case_ids", to: "product.UC" }
    - { from: "UC.cross_references.technical", to: "technical.API" }
  key_fields:
    PL: ["target_users"]
    PM: ["parent_id"]
    FT: ["invokes_api_ids", "realizes_use_case_ids", "acceptance_criteria"]
    UC: ["cross_references"]

references:
  - { path: "./README.md", note: "人类可读说明" }
  - { path: "./product_knowledge.json", note: "扁平实体" }
  - { path: "../../INDEX_GUIDE.md", note: "联邦索引" }

layers:
  - { key: pl, code: PL, order: 1, id_pattern: "PL-{NAME}", parent: null }
  - { key: pm, code: PM, order: 2, id_pattern: "PM-{NAME}", parent: PL }
  - { key: ft, code: FT, order: 3, id_pattern: "FT-{NAME}", parent: PM }
  - { key: uc, code: UC, order: 4, id_pattern: "UC（可选 full_id）", parent: FT }

indexing:
  readme_index_table: true
  sync: "变更 ID 时同步 README、KNOWLEDGE_INDEX.md（按需）"
