# system/solutions — 解决方案阶段统一元数据（单文件 SSOT）
# 结构：identity + repository + pipeline + integration + layers（每层一条，无重复的全局 inputs）
schema_version: "1.1"

# -----------------------------------------------------------------------------
# 1. 阶段身份
# -----------------------------------------------------------------------------
identity:
  id: "DIR-SOLUTIONS"
  name: "解决方案（solutions）"
  description: >
    AI SDD 解决方案阶段：从业务诉求中提取结构化需求，评估影响面、识别冲突并形成解决方案，
    输出 SOLUTION-{ID}.md，作为 analysis 阶段输入。本文件为 solutions/ 唯一元数据入口。

role:
  stage: "solution"
  sdd_phase: "solution"
  is_system_level_index: true
  outputs_are_inputs_for: "analysis"

# -----------------------------------------------------------------------------
# 2. 仓库与目录约定（锚点 + 命名模式）
# -----------------------------------------------------------------------------
repository:
  root_relative: "solutions"
  child_directories: []
  child_files:
    - "README.md"
    - "SOLUTION-{ID}.md"
  hierarchy:
    chain: "SOLUTION（根目录平铺单文件交付物）"
    labels:
      SOLUTION: "解决方案文档（Solution document）"
  directory_patterns:
    solution: "SOLUTION-{ID}.md"

# -----------------------------------------------------------------------------
# 3. 阶段输入 / 产出（全层共享，不在各层重复声明）
# -----------------------------------------------------------------------------
pipeline:
  inputs:
    - path: "../knowledge/"
      description: "系统知识库（business/product/technical/data + constitution）"
    - path: "(external)"
      description: "业务需求描述来源（邮件、会议纪要、工单等）"
  outputs:
    ssot_file: "solutions_meta.yaml"
    narrative: "交付物形态与 frontmatter 约定见 `layers`；根目录平铺 Markdown，不并列子级 *_meta.yaml。"
    directory_role: "README + 方案索引表 + SOLUTION-{ID}.md 文件集。"

# -----------------------------------------------------------------------------
# 4. 追溯与下游
# -----------------------------------------------------------------------------
integration:
  traceability:
    - "可与 knowledge 四视角实体 ID 建立引用（正文与 frontmatter，不重复定义实体）"
  downstream:
    - path: "../analysis/"
      via: "ANALYSIS-{ID}.md 的 frontmatter.parent → SOLUTION-{ID}"
      description: "需求分析文档关联到本目录对应解决方案"
  key_fields:
    solution_document:
      - "id"
      - "parent（可选）"
      - "dependencies（可选）"

# -----------------------------------------------------------------------------
# 5. 文档引用
# -----------------------------------------------------------------------------
references:
  - path: "./README.md"
    description: "本目录说明与方案索引表"
  - path: "../DESIGN.md"
    description: "全局目录结构与阶段设计"
  - path: "../SYSTEM_INDEX.md"
    description: "全局索引"
  - path: "../../.ai/skills/sdx-solution/SKILL.md"
    description: "解决方案阶段目标与工作流"
  - path: "../../.ai/rules/solution/solution-template.md"
    description: "解决方案文档模板"

# -----------------------------------------------------------------------------
# 6. 层级模型（单一层：解决方案文档）
# -----------------------------------------------------------------------------
layers:
  - key: "sol"
    code: "SOLUTION"
    order: 1
    entity_kind: "solution_document"
    id_pattern: "SOLUTION-{ID}"
    parent: null
    tree:
      child_directory_glob: null
    artifacts:
      markdown: "SOLUTION-{ID}.md"
    fields:
      id_guidance: "{ID} 建议为 {YYYYMMDD}-{业务诉求概述} 或项目约定的唯一编号；概述可由 Agent 从描述系统提取"
    frontmatter_constraints:
      solution_document:
        required_fields:
          - "id"
        optional_fields:
          - "parent"
          - "dependencies"
        constraints:
          - "frontmatter.id 与文件名 SOLUTION-{ID}.md 保持一致"
    indexing:
      readme_index_table: true
      rule: "新增解决方案文档应登记到 README.md 的方案索引表"

# -----------------------------------------------------------------------------
# 7. 全局索引运维
# -----------------------------------------------------------------------------
indexing:
  readme_index_table: true
  rule: "任一 SOLUTION 变更时，更新本文件（若扩展 layers）、README.md 与必要的根 INDEX"
