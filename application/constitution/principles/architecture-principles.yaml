# 架构原则条目（与 constitution 配套；细则以 ADR / 评审为准）
architecture_principles:
  version: "2.0"
  last_reviewed: null
  next_review: null
  approved_by: Architecture Board

  meta_principles:
    - id: MP-01
      name: 原则数量克制
      statement: 核心原则可执行、数量克制，避免口号化。
    - id: MP-02
      name: 原则可验证
      statement: 每条原则应有可操作的验证或评审方式。

  principles:
    - id: AP-01
      name: 业务能力驱动
      category: business-alignment
      statement: 系统边界与业务能力边界对齐，而非仅按技术层次划分。
    - id: AP-02
      name: 演进式架构
      category: business-alignment
      statement: 架构支持增量变更，重大变更需渐进路径与回滚预案。
    - id: AP-03
      name: 数据所有权明确
      category: data-governance
      statement: 每个数据实体有唯一权威来源服务。
    - id: AP-04
      name: 事件作为一等公民
      category: data-governance
      statement: 跨服务状态传播优先领域事件，配合幂等与契约版本。
    - id: AP-05
      name: API 优先
      category: technical-excellence
      statement: 服务能力通过定义良好的 API 暴露，契约先于实现。
    - id: AP-06
      name: 故障隔离
      category: technical-excellence
      statement: 单组件故障不导致全站不可用；限流、熔断、降级内建。
    - id: AP-07
      name: 可观测性内建
      category: technical-excellence
      statement: 服务内建日志、指标、链路追踪等可观测性。
    - id: AP-08
      name: 零信任安全
      category: security
      statement: 服务间默认不信任，认证授权与最小权限。
    - id: AP-09
      name: 团队自治与对齐
      category: organization
      statement: 团队在服务边界内自治，跨团队接口与标准对齐。
    - id: AP-10
      name: 文档即代码
      category: organization
      statement: 架构文档与代码同仓、版本化，关键一致性可 CI 校验。

  knowledge_repo_principles:
    - id: KP-01
      name: 单一事实源
      category: knowledge-management
      statement: 知识实体单点定义，他处仅 ID 引用；映射写在源侧 meta 或 JSON。
